<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{Base::parent(~{::#content},~{::title})}">
<head>
    <title th:text="${LoggedInUser.name}+' | Add Contacts'" ></title>
</head>
<body>
<div id="content">
    <!--Sidebar-->
    <div th:if="${LoggedInUser != null}">
        <div th:replace="~{user/SideBar::sidebar}"></div>
    </div>


    <div class="p-6 ml-64 pt-16">
        <div class="grid grid-cols-12">
            <div class="col-span-3"></div>
            <div class="col-span-6">


                <div class=" mt-5 p-6 bg-gray-50 border border-gray-200 rounded-lg shadow-sm dark:bg-gray-800 dark:border-gray-700">
                    <h5 class="mb-1 text-2xl font-bold tracking-tight text-gray-900 dark:text-white">Add Contacts</h5>
                    <p class="mb-3 text-sm font-light text-gray-700 dark:text-gray-400">Add the contacts details here that you want to save in the contacts</p>

                    <!--Form Input fields-->

                    <div th:replace="~{messages::messagebox}"></div>

                    <form
                            th:action="@{/SMC/user/Contact/add}"
                            method="post"
                            th:object="${contactForm}"
                            enctype="multipart/form-data"
                    >

                        <label for="name" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact Name</label>
                        <div class="relative mb-1">
                            <div class="absolute inset-y-0 start-0 flex items-center ps-3.5 pointer-events-none">
                                <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 16">
                                    <path d="m10.036 8.278 9.258-7.79A1.979 1.979 0 0 0 18 0H2A1.987 1.987 0 0 0 .641.541l9.395 7.737Z"/>
                                    <path d="M11.241 9.817c-.36.275-.801.425-1.255.427-.428 0-.845-.138-1.187-.395L0 2.6V14a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V2.5l-8.759 7.317Z"/>
                                </svg>
                            </div>
                            <input th:field="*{name}" type="text" id="name" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full ps-10 p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Contacts Name Here">
                        </div>
                        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-red-600 font-thin py-1 px-1 text-xs mb-3"></p>
                        <label for="email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact Email</label>
                        <div class="flex mb-1">
                              <span class="inline-flex items-center px-3 text-sm text-gray-900 bg-gray-200 border rounded-e-0 border-gray-300 border-e-0 rounded-s-md dark:bg-gray-600 dark:text-gray-400 dark:border-gray-600">
                                <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M10 0a10 10 0 1 0 10 10A10.011 10.011 0 0 0 10 0Zm0 5a3 3 0 1 1 0 6 3 3 0 0 1 0-6Zm0 13a8.949 8.949 0 0 1-4.951-1.488A3.987 3.987 0 0 1 9 13h2a3.987 3.987 0 0 1 3.951 3.512A8.949 8.949 0 0 1 10 18Z"/>
                                </svg>
                              </span>
                            <input th:field="*{email}" type="email" id="email" class="rounded-none rounded-e-lg bg-gray-50 border text-gray-900 focus:ring-blue-500 focus:border-blue-500 block flex-1 min-w-0 w-full text-sm border-gray-300 p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="example@gmail.com">
                        </div>
                        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-600 font-thin py-1 px-1 text-xs mb-3"></p>

                        <label for="phoneNumber" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact Phone Number</label>
                        <div class="flex mb-1">
                              <span class="inline-flex items-center px-3 text-sm text-gray-900 bg-gray-200 border rounded-e-0 border-gray-300 border-e-0 rounded-s-md dark:bg-gray-600 dark:text-gray-400 dark:border-gray-600">
                                <i class="fa-solid fa-phone"></i>
                              </span>
                            <input th:field="*{phoneNumber}" type="tel" id="phoneNumber" class="rounded-none rounded-e-lg bg-gray-50 border text-gray-900 focus:ring-blue-500 focus:border-blue-500 block flex-1 min-w-0 w-full text-sm border-gray-300 p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="9584364134">
                        </div>
                        <p th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="text-red-600 font-thin py-1 px-1 text-xs mb-3"></p>

                        <div class="flex flex-col mb-1">
                            <label for="address" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact Address</label>
                            <textarea th:field="*{address}" id="address" rows="4" class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Add The Address Here"></textarea>
                        </div>
                        <p th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="text-red-600 font-thin py-1 px-1 text-xs mb-3"></p>

                        <div class="flex space-x-2 mb-1">
                            <div class="flex-1">
                                <label for="instagramLink" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact's Instagram</label>
                                <div class="flex mb-3">
                                  <span class="inline-flex items-center px-3 text-sm text-gray-900 bg-gray-200 border rounded-e-0 border-gray-300 border-e-0 rounded-s-md dark:bg-gray-600 dark:text-gray-400 dark:border-gray-600">
                                      <i class="fa-brands fa-instagram"></i>
                                  </span>
                                    <input th:field="*{instagramLink}" type="url" id="instagramLink" class="rounded-none rounded-e-lg bg-gray-50 border text-gray-900 focus:ring-blue-500 focus:border-blue-500 block flex-1 min-w-0 w-full text-sm border-gray-300 p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Instagram link here">
                                </div>
                            </div>
                            <div class="flex-1">
                                <label for="twitterLink" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact's Twitter </label>
                                <div class="flex mb-3">
                                  <span class="inline-flex items-center px-3 text-sm text-gray-900 bg-gray-200 border rounded-e-0 border-gray-300 border-e-0 rounded-s-md dark:bg-gray-600 dark:text-gray-400 dark:border-gray-600">
                                      <i class="fa-brands fa-twitter"></i>
                                  </span>
                                    <input th:field="*{twitterLink}" type="url" id="twitterLink" class="rounded-none rounded-e-lg bg-gray-50 border text-gray-900 focus:ring-blue-500 focus:border-blue-500 block flex-1 min-w-0 w-full text-sm border-gray-300 p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Twitter link here">
                                </div>
                            </div>
                        </div>
                        <div class="flex space-x-2 mb-1">
                            <div class="flex-1">
                                <label for="linkedinLink" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact's LinkedIn</label>
                                <div class="flex mb-3">
                                  <span class="inline-flex items-center px-3 text-sm text-gray-900 bg-gray-200 border rounded-e-0 border-gray-300 border-e-0 rounded-s-md dark:bg-gray-600 dark:text-gray-400 dark:border-gray-600">
                                      <i class="fa-brands fa-linkedin"></i>
                                  </span>
                                    <input th:field="*{linkedinLink}" type="url" id="linkedinLink" class="rounded-none rounded-e-lg bg-gray-50 border text-gray-900 focus:ring-blue-500 focus:border-blue-500 block flex-1 min-w-0 w-full text-sm border-gray-300 p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="LinkedIn link here">
                                </div>
                            </div>
                            <div class="flex-1">
                                <label for="websiteLink" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contact's Website</label>
                                <div class="flex mb-3">
                                  <span class="inline-flex items-center px-3 text-sm text-gray-900 bg-gray-200 border rounded-e-0 border-gray-300 border-e-0 rounded-s-md dark:bg-gray-600 dark:text-gray-400 dark:border-gray-600">
                                      <i class="fa-solid fa-link"></i>
                                  </span>
                                    <input th:field="*{websiteLink}" type="url" id="websiteLink" class="rounded-none rounded-e-lg bg-gray-50 border text-gray-900 focus:ring-blue-500 focus:border-blue-500 block flex-1 min-w-0 w-full text-sm border-gray-300 p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Website link here">
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-col mb-1">
                            <label for="description" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">About Contact</label>
                            <textarea th:field="*{description}" id="description" rows="4" class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Add information about the contact"></textarea>
                        </div>

                        <div class="flex flex-col mb-3">
                            <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white" for="imageFileInput">Upload Contact's Image</label>
                            <input th:field="*{contactImage}" class="block w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50 dark:text-gray-400 focus:outline-none dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400" id="imageFileInput" type="file">
                            <!--Here we are creating an image tag so that we can preview the uploaded image and this will be done using js                             -->
                            <img class="max-h-50 rounded mx-auto mt-3 border shadow" src="" id="uplaod_image_preview" alt=""/>
                        </div>


                        <div class="flex items-center mb-4">
                            <input th:field="*{favourite}" id="favourite" type="checkbox" value="" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded-sm focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                            <label  for="favourite" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">Is the Contact your favourite</label>
                        </div>

                        <div class="flex items-center justify-center gap-3">
                            <button type="submit" class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700">Submit</button>
                            <button type="reset" class="text-white bg-orange-700 hover:bg-orange-800 focus:ring-4 focus:outline-none font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-orange-600 dark:hover:bg-orange-700">Reset</button>
                        </div>

                    </form>

                </div>

            </div>
        </div>
    </div>
    <script th:src="@{'/js/Admin.js'}"></script>
</div>

</body>
</html>
