<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{Base::parent(~{::#content},~{::title})}">
<head>
    <title th:text="${LoggedInUser.name}+' | DashBoard'" ></title>
</head>
<body>
<div id="content">
    <!--Sidebar-->
    <div th:if="${LoggedInUser != null}">
        <div th:replace="~{user/SideBar::sidebar}"></div>
    </div>


    <div class="p-6 ml-64 pt-16">
        <h1 class="text-2xl font-semibold text-heading">DASHBOARD</h1>
        <p class="mt-2 text-gray-600 dark:text-gray-300">You are successfully logged in!</p>
    </div>
</div>
</body>
</html>
