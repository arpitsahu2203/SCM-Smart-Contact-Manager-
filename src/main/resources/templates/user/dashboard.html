<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{Base::parent(~{::#content},~{::title})}">
<head>
    <title>Dashboard</title>
</head>
<body>
    <div th:fragment="content" id="content" class="p-6">
        <h1 class="text-2xl font-semibold text-heading">Welcome to your Dashboard</h1>
        <p class="mt-2 text-gray-600 dark:text-gray-300">You are successfully logged in!</p>
        <a th:href="@{/do-logout}" class="absolute top-4 right-4 text-sm text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white">Logout</a>
    </div>
</body>
</html>
