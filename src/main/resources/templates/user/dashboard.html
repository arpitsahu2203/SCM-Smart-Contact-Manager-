<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{Base::parent(~{::#content},~{::title})}">
<head>
    <title>Dashboard</title>
</head>
<body>
    <div th:fragment="content" id="content" class="p-6">
        <h1 class="text-2xl font-semibold text-heading">Welcome to your Dashboard</h1>
        <p class="mt-2 text-gray-600 dark:text-gray-300">You are successfully logged in!</p>
        <a th:href="@{/do-logout}" class="text-white bg-orange-700 hover:bg-orange-800 focus:ring-4 focus:outline-none font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-orange-600 dark:hover:bg-orange-700">Logout</a>
    </div>
</body>
</html>
