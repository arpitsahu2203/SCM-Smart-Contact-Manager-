<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="parent(content,title)" class="h-full bg-white dark:bg-gray-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Base</title>

    <!-- ✅ Inline script FIRST — prevents theme flash -->
    <script>
        // In base.html <head> inline script
        (function() {
            const saved = localStorage.getItem("theme");
            const theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.classList.add(theme);
        })();
    </script>

    <link rel="stylesheet" th:href="@{/css/output.css}">
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body class="m-0 min-h-screen bg-white text-black dark:bg-gray-900 dark:text-white transition-colors duration-300">

    <div th:replace="~{navbar::navbar}"></div>
    <!-- ✅ ADD THIS — renders the child page's content -->
    <th:block th:replace="${content}"></th:block>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <script th:src="@{/JS/Script.js}"></script>

</body>
</html>
