<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{Base::parent(~{::#content},~{::title})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
</head>
<body>
    <div id="content" class="mt-2">
        <div class="grid grid-cols-12">
            <div class="col-span-4 md:col-span-2 lg:col-span-3 xl:col-span-3"></div>
            <div class="col-span-12 md:col-span-8 lg:col-span-6 xl:col-span-6 justify-self-center w-full px-4"> 
                <a class="bg-neutral-primary-soft block w-full max-w-md mx-auto p-6 border border-default rounded-xl shadow-xs hover:bg-neutral-secondary-medium text-left">
                    <div th:replace="messages::messagebox"></div>
                    <h5 class="mb-3 text-2xl font-semibold tracking-tight text-heading leading-8">Sign Up</h5>
                        <!-- Bind this form to the model object named userform. -->
                        <form th:action="@{/SMC/do-register}" 
                        method="post"
                        th:object="${userform}" 
                        class="w-full mt-5"
                        novalidate>
                            <!-- POST sends data in the request body instead of the URL. -->
                        <div class="mb-5">
                            <label for="name" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Your Name</label>
                            <input type="text" id="name" th:field="*{name}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Your Name" required />
                            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-red-600 text-xs font-thin py-1 px-1"></p>
                            <!-- Use *{} inside this form to bind fields to th:object="${userform}". -->
                        </div>
                        <div class="mb-5">
                            <label for="email" class="block mb-1 text-sm font-medium text-gray-900 dark:text-white">Your Email</label>
                            <input type="email" id="Email" th:field="*{Email}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="name@abc" required />
                            <p th:if="${#fields.hasErrors('Email')}" th:errors="*{Email}" class="text-red-600 text-xs font-thin py-1 px-1"></p>
                        </div>
                        <div class="mb-5">
                            <label for="phoneNumber" class="block mb-1 text-sm font-medium text-gray-900 dark:text-white">Your Phone Number</label>
                            <input type="text" id="PhoneNumber" th:field="*{PhoneNumber}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="445151..." required />
                            <p th:if="${#fields.hasErrors('PhoneNumber')}" th:errors="*{PhoneNumber}" class="text-red-600 text-xs font-thin py-1 px-1"></p>
                        </div>
                        <div class="mb-5">
                            <label for="password" class="block mb-1 text-sm font-medium text-gray-900 dark:text-white">Your password</label>
                            <input type="password" id="Password" th:field="*{Password}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" required />
                            <p th:if="${#fields.hasErrors('Password')}" th:errors="*{Password}" class="text-red-600 text-xs font-thin py-1 px-1"></p>
                        </div>
                        <div class="mb-5">
                            <label for="about" class="block mb-1 text-sm font-medium text-gray-900 dark:text-white">About Yourself</label>
                            <textarea id="about" th:field="*{about}" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="My name is..." required></textarea>
                            <p th:if="${#fields.hasErrors('about')}" th:errors="*{about}" class="text-red-600 text-xs font-thin py-1 px-1"></p>
                        </div>
                        <div class="flex items-center justify-center gap-3">
                            <button type="submit" class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700">Submit</button>
                            <button type="reset" class="text-white bg-orange-700 hover:bg-orange-800 focus:ring-4 focus:outline-none font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-orange-600 dark:hover:bg-orange-700">Reset</button>
                        </div>

                        </form>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
</body>
</html>
